name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      DATABASE_URL: sqlite:///db.sqlite3
      MONGODB_HOST: mongodb://localhost:27017/
      MONGODB_NAME: mantis_shrimp_bot_test
      DJANGO_SECRET_KEY: test-secret
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Wait for MongoDB
      run: |
        for i in {1..30}; do
          python -c "from pymongo import MongoClient; MongoClient('mongodb://localhost:27017/').server_info()" && break
          sleep 1
        done
    - name: Run Tests
      run: |
        python manage.py test
