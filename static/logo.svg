<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -8 180 88">
  <defs>
    <!-- Peacock mantis: neon green, electric blue, fiery orange, deep red -->
    <linearGradient id="bodyGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#2d8a5e"/>
      <stop offset="25%" style="stop-color:#3db070"/>
      <stop offset="50%" style="stop-color:#4ade80"/>
      <stop offset="75%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="40%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="segmentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.2)"/>
    </linearGradient>
    <radialGradient id="bubbleGrad">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
      <stop offset="50%" style="stop-color:rgba(135,206,250,0.6)"/>
      <stop offset="100%" style="stop-color:rgba(100,180,255,0.2)"/>
    </radialGradient>
    <radialGradient id="steamGrad">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
      <stop offset="60%" style="stop-color:rgba(200,230,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Tail fan - green with blue accent -->
  <path d="M4 36 Q10 30 16 36 Q10 42 4 36 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.6"/>
  <path d="M6 34 L12 28 L18 34 L12 40 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.5"/>
  <path d="M6 38 L12 44 L18 38 L12 32 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.5"/>

  <!-- Abdomen segments - armored, with leopard spots -->
  <path d="M16 26 L24 24 L26 28 L24 44 L16 42 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="20" cy="34" rx="2.5" ry="2" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="22" cy="38" rx="1.5" ry="1.2" fill="#f97316" opacity="0.8"/>
  <path d="M24 24 L32 22 L34 26 L32 46 L24 44 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="28" cy="32" rx="2.2" ry="1.8" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="30" cy="40" rx="1.8" ry="1.5" fill="#f97316" opacity="0.8"/>
  <path d="M32 22 L40 20 L42 24 L40 48 L32 46 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="36" cy="30" rx="2.5" ry="2" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="38" cy="42" rx="1.5" ry="1.2" fill="#f97316" opacity="0.8"/>
  <path d="M40 20 L48 20 L50 24 L48 48 L40 48 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="44" cy="32" rx="2.2" ry="1.8" fill="#0ea5e9" opacity="0.9"/>
  <path d="M48 20 L56 22 L58 26 L56 46 L48 48 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="52" cy="34" rx="2" ry="1.6" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="54" cy="40" rx="1.5" ry="1.2" fill="#f97316" opacity="0.8"/>
  <path d="M56 22 L64 26 L66 30 L64 42 L56 46 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.6"/>

  <!-- Segment highlights -->
  <path d="M18 28 L22 26 L23 29 L19 41 Z" fill="url(#segmentGrad)"/>
  <path d="M26 26 L30 24 L31 27 L27 45 Z" fill="url(#segmentGrad)"/>
  <path d="M34 24 L38 22 L39 25 L35 47 Z" fill="url(#segmentGrad)"/>
  <path d="M42 22 L46 22 L47 25 L43 47 Z" fill="url(#segmentGrad)"/>
  <path d="M50 22 L54 24 L55 27 L51 45 Z" fill="url(#segmentGrad)"/>

  <!-- Walking legs - orange -->
  <path d="M52 40 L56 46 L54 48 L50 42 Z" fill="#f97316" stroke="#ea580c" stroke-width="0.4"/>
  <path d="M44 42 L48 48 L46 50 L42 44 Z" fill="#f97316" stroke="#ea580c" stroke-width="0.4"/>
  <path d="M36 44 L40 50 L38 52 L34 46 Z" fill="#f97316" stroke="#ea580c" stroke-width="0.4"/>

  <!-- Cephalothorax - green with spots -->
  <path d="M64 26 L80 20 L92 24 L94 30 L92 38 L80 42 L64 42 L66 34 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.6"/>
  <ellipse cx="76" cy="30" rx="3" ry="2.5" fill="#0ea5e9" opacity="0.9"/>
  <ellipse cx="82" cy="36" rx="2" ry="1.6" fill="#f97316" opacity="0.8"/>

  <!-- Raptorial claw - orange with spots, up/down + strike (async movement) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -5; 0 3; 0 -3; 0 1; 7 -6; 0 0" keyTimes="0; 0.15; 0.35; 0.5; 0.65; 0.78; 1" dur="4s" repeatCount="indefinite"/>
    <path d="M76 24 L102 8 L122 14 L120 28 L110 38 L92 34 L78 30 Z" fill="url(#clawGrad)" stroke="#c2410c" stroke-width="0.6"/>
    <ellipse cx="100" cy="22" rx="2.5" ry="2" fill="#0ea5e9" opacity="0.85"/>
    <path d="M110 38 L118 32 L128 40 L126 50 L116 44 L106 40 Z" fill="url(#clawGrad)" stroke="#c2410c" stroke-width="0.5"/>
    <ellipse cx="120" cy="26" rx="2" ry="1.5" fill="#0ea5e9" opacity="0.85"/>
    <!-- Dactyl (striking surface) - moves async on different cycle -->
    <g>
      <animateTransform attributeName="transform" type="translate" additive="sum"
        values="0 0; 0 4; 0 -2; 0 3; 0 -4; 0 0" keyTimes="0; 0.25; 0.5; 0.7; 0.9; 1" dur="2.8s" repeatCount="indefinite" begin="0.5s"/>
      <ellipse cx="118" cy="32" rx="10" ry="7" fill="url(#clawGrad)" stroke="#c2410c" stroke-width="0.5"/>
      <ellipse cx="120" cy="30" rx="2.5" ry="2" fill="#0ea5e9" opacity="0.8"/>
    </g>
  </g>

  <!-- LARGE boiling water effect - more visible, rendered on top -->
  <ellipse cx="128" cy="28" rx="28" ry="20" fill="url(#steamGrad)" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.85;0.5" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="24;32;24" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="16;24;16" dur="0.6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Large rising bubbles -->
  <circle cx="114" cy="34" r="5" fill="url(#bubbleGrad)">
    <animate attributeName="cy" values="34;10;10" keyTimes="0;0.75;1" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.95;0.5;0" keyTimes="0;0.75;1" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;6;4" keyTimes="0;0.5;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="134" cy="26" r="4.5" fill="url(#bubbleGrad)">
    <animate attributeName="cy" values="26;2;2" keyTimes="0;0.75;1" dur="1.2s" repeatCount="indefinite" begin="0.15s"/>
    <animate attributeName="opacity" values="0.9;0.4;0" keyTimes="0;0.75;1" dur="1.2s" repeatCount="indefinite" begin="0.15s"/>
    <animate attributeName="r" values="4.5;5.5;3.5" keyTimes="0;0.5;1" dur="1.2s" repeatCount="indefinite" begin="0.15s"/>
  </circle>
  <circle cx="106" cy="40" r="4" fill="url(#bubbleGrad)">
    <animate attributeName="cy" values="40;16;16" keyTimes="0;0.75;1" dur="0.9s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="opacity" values="0.85;0.35;0" keyTimes="0;0.75;1" dur="0.9s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="r" values="4;5;3" keyTimes="0;0.5;1" dur="0.9s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="144" cy="32" r="3.5" fill="url(#bubbleGrad)">
    <animate attributeName="cy" values="32;8;8" keyTimes="0;0.75;1" dur="1.1s" repeatCount="indefinite" begin="0.45s"/>
    <animate attributeName="opacity" values="0.8;0.3;0" keyTimes="0;0.75;1" dur="1.1s" repeatCount="indefinite" begin="0.45s"/>
    <animate attributeName="r" values="3.5;4.5;2.5" keyTimes="0;0.5;1" dur="1.1s" repeatCount="indefinite" begin="0.45s"/>
  </circle>
  <circle cx="122" cy="44" r="3" fill="url(#bubbleGrad)">
    <animate attributeName="cy" values="44;20;20" keyTimes="0;0.75;1" dur="0.85s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="opacity" values="0.75;0.25;0" keyTimes="0;0.75;1" dur="0.85s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="r" values="3;4;2" keyTimes="0;0.5;1" dur="0.85s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="138" cy="38" r="2.5" fill="url(#bubbleGrad)">
    <animate attributeName="cy" values="38;14;14" keyTimes="0;0.75;1" dur="1.05s" repeatCount="indefinite" begin="0.75s"/>
    <animate attributeName="opacity" values="0.7;0.2;0" keyTimes="0;0.75;1" dur="1.05s" repeatCount="indefinite" begin="0.75s"/>
    <animate attributeName="r" values="2.5;3.5;1.5" keyTimes="0;0.5;1" dur="1.05s" repeatCount="indefinite" begin="0.75s"/>
  </circle>

  <!-- Eye stalk - purple eyes, large and prominent -->
  <path d="M84 18 L94 10 L96 14 L88 20 Z" fill="url(#bodyGrad)" stroke="#15803d" stroke-width="0.4"/>
  <ellipse cx="94" cy="12" rx="7" ry="7" fill="url(#eyeGrad)" stroke="#6d28d9" stroke-width="0.5"/>
  <ellipse cx="95" cy="11" rx="2" ry="2" fill="#1e1b4b"/>
  <ellipse cx="91" cy="13" rx="1.2" ry="1.2" fill="rgba(255,255,255,0.6)"/>

  <!-- Antennae -->
  <path d="M80 26 L88 22" stroke="#f97316" stroke-width="0.5" fill="none"/>
  <path d="M82 24 L90 20" stroke="#f97316" stroke-width="0.4" fill="none"/>
</svg>
