{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<h1>{{ title }}</h1>
<table style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr>
            <th style="text-align: left; padding: 8px; border-bottom: 1px solid #ddd;">Name</th>
            <th style="text-align: left; padding: 8px; border-bottom: 1px solid #ddd;">Created</th>
        </tr>
    </thead>
    <tbody>
        {% for org in organizations %}
        <tr>
            <td style="padding: 8px; border-bottom: 1px solid #eee;">{{ org.name }}</td>
            <td style="padding: 8px; border-bottom: 1px solid #eee;">{{ org.created_at|date:"Y-m-d H:i" }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="2" style="padding: 16px;">No organizations yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
